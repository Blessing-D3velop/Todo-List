<!DOCTYPE html>
<html>
<head>
  <title>To-Do List Blessing-D3v</title>
  <link rel="stylesheet" href="Todo.css">
</head>
<body>
  <div class="container">
    <h1>Blessing's To-Do List</h1>

    <div class="input-section">
      <input type="text" placeholder="Enter task..." class="js-input">
      <input type="date" class="js-date">

      <select class="js-select-priority">
        <option value="">Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <button class="js-button">+ Add</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
      <div>Total Tasks: <span class="total-tasks">0</span></div>
      <div>Completed: <span class="completed-tasks">0</span></div>
      <div>Pending: <span class="pending-tasks">0</span></div>
    </div>

    <div class="js-output task-list"></div>
  </div>

  <script src="todo.js"></script>
</body>
</html>
