<!DOCTYPE html>
<html>
  <head>
    <title>To do List Blessing-D3v</title>
    <link rel="stylesheet" href="Todo.css">
    </head>
  <body>
  <div class="container">
    <h1>Blessing's To-Do List</h1>

    <div class="input-section">
      <input type="text" placeholder="Enter task..." class="js-input">
      <input type="date" class="js-date">

      <select class="js-select-priority">
        <option value="">Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <button class="js-button">+ Add</button>
    </div>

    <div class="js-output task-list"></div>
  </div>

</body>
    <script src="todo.js"></script>
  </body>
</html>
